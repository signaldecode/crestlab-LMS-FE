          - listitem [ref=e824]:
            - text: 리액트입문탈출2025.11.02
            - generic [ref=e825]: 별점 5점
            - text: 비전공자가 첫 프론트엔드 취업 성공기강의를 듣기 전엔 React가 너무 어렵게 느껴졌는데, 이제는 직접 컴포넌트를 설계하고 사이드 프로젝트도 만들 수 있게 됐어요. 첫 회사 입사에 성공했습니다!
          - listitem [ref=e826]:
            - text: 백엔드성장기2025.10.15
            - generic [ref=e827]: 별점 5점
            - text: 신입 백엔드 개발자가 알아두면 좋은 NestJS 패턴막연하게 백엔드는 어렵다고만 생각했는데, 이 강의 덕분에 실무에서 쓰는 NestJS 패턴을 제대로 배울 수 있었습니다.
          - listitem [ref=e828]:
            - text: 주니어개발일기2025.09.22
            - generic [ref=e829]: 별점 5점
            - text: 비전공 주니어가 시니어로 성장하기까지비전공이라 개발은 남의 이야기인 줄 알았어요. 강의에서 알려준 학습법을 꾸준히 실천했더니 시니어 트랙에 올라설 수 있었습니다. 정말 감사합니다.
          - listitem [ref=e830]:
            - text: 직장인개발자2025.08.30
            - generic [ref=e831]: 별점 5점
            - text: 직장인 10년차, 드디어 개발자로 전직했습니다사무직만 하던 제가 코딩을 시작할 수 있게 됐어요. 강사님의 설명이 너무 명쾌해서 처음 듣는 개념도 쉽게 이해됐습니다.
          - listitem [ref=e832]:
            - text: 코드새싹2025.07.18
            - generic [ref=e833]: 별점 5점
            - text: 처음 접하는 분들도 쉽게 이해할 수 있는 강의코딩을 처음 시작하는 입장에서 기초부터 차근차근 알려줘서 정말 도움이 많이 됐어요. 강의 퀄리티가 기대 이상입니다.
          - listitem [ref=e834]:
            - text: 풀스택도전기2025.06.10
            - generic [ref=e835]: 별점 5점
            - text: 마인드셋부터 실전까지, 완벽한 학습 로드맵단순한 코딩 강의가 아니라 개발자 마인드셋부터 시작해서 실전 프로젝트까지 체계적으로 가르쳐줘요. 개발 인생이 달라졌습니다.
          - listitem [ref=e836]:
            - text: 코드분석러2025.05.28
            - generic [ref=e837]: 별점 5점
            - text: 복잡한 코드 베이스 분석이 이렇게 쉬울 수가 없어요복잡하게만 보였던 오픈소스 코드 읽기를 이렇게 단순하게 할 수 있다니 놀라웠어요. 매주 새로운 라이브러리를 분석하는 게 즐거워졌습니다.
          - listitem [ref=e838]:
            - text: 커리어성공기2025.04.14
            - generic [ref=e839]: 별점 5점
            - text: 개발 커리어를 시작하려는 모든 분에게 강력 추천연봉 협상부터 포트폴리오 작성까지 이 강의를 통해 본격적으로 개발자 커리어를 시작했어요. 강의 내용이 실용적이고 따라 하기 쉬워서 바로 적용할 수 있었습니다.
          - listitem [ref=e840]:
            - text: 주니어개발자2025.03.05
            - generic [ref=e841]: 별점 5점
            - text: 주니어에서 미들로, 인생을 바꿔준 강의회사에 다니면서도 꾸준히 성장할 수 있다는 걸 이 강의에서 배웠어요. 지금은 매달 사이드 프로젝트를 출시하며 실력을 키워가고 있습니다.
          - listitem [ref=e842]:
            - text: 처음엔반신반의2025.02.22
            - generic [ref=e843]: 별점 5점
            - text: 처음엔 반신반의했는데 결과가 달라졌습니다솔직히 처음에는 "이게 정말 될까?" 싶었어요. 그런데 강의 내용을 하나하나 실천하다 보니 어느새 GitHub 잔디가 가득 차 있었습니다.
